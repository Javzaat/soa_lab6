<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Login Page</h1>

        <label for="username">Username:</label>
        <input type="text" id="username" placeholder="Enter username">

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter password">

        <button onclick="loginUser()">Login</button>

        <p id="result" class="message"></p>

        <a href="register.html">Go to Register</a>
    </div>

    <script>
        async function loginUser() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const result = document.getElementById("result");

            if (!username || !password) {
                result.innerText = "Username болон password оруулна уу.";
                return;
            }

            localStorage.removeItem("token");

            const soapRequest = `
    <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                    xmlns:aut="http://example.com/authsoap">
    <soapenv:Header/>
    <soapenv:Body>
        <aut:LoginUserRequest>
            <aut:username>${username}</aut:username>
            <aut:password>${password}</aut:password>
        </aut:LoginUserRequest>
    </soapenv:Body>
    </soapenv:Envelope>`;

            try {
                const response = await fetch("http://localhost:8081/ws", {
                    method: "POST",
                    headers: {
                        "Content-Type": "text/xml"
                    },
                    body: soapRequest
                });

                const text = await response.text();
                console.log("SOAP RESPONSE:", text);

                const parser = new DOMParser();
                const xml = parser.parseFromString(text, "text/xml");

                const tokenElement =
                    xml.getElementsByTagName("ns2:token")[0] ||
                    xml.getElementsByTagName("token")[0];

                const messageElement =
                    xml.getElementsByTagName("ns2:message")[0] ||
                    xml.getElementsByTagName("message")[0];

                const token = tokenElement ? tokenElement.textContent.trim() : "";
                const message = messageElement ? messageElement.textContent.trim() : "";

                if (token) {
                    localStorage.setItem("token", token);
                    result.innerText = "Login successful";
                    window.location.href = "profile.html";
                } else {
                    result.innerText = message || "Login failed";
                }
            } catch (error) {
                console.error(error);
                result.innerText = "Login хийх үед алдаа гарлаа.";
            }
        }
    </script>
</body>
</html>
