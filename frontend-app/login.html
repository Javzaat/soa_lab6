<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<body>
    <h1>Login Page</h1>

    <label for="username">Username:</label><br>
    <input type="text" id="username" placeholder="Enter username"><br><br>

    <label for="password">Password:</label><br>
    <input type="password" id="password" placeholder="Enter password"><br><br>

    <button onclick="loginUser()">Login</button>

    <p id="result"></p>

    <br>
    <a href="register.html">Go to Register</a>

    <script>
        async function loginUser() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const result = document.getElementById("result");

            if (!username || !password) {
                result.innerText = "Username болон password оруулна уу.";
                return;
            }

            const soapRequest = `
<soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                  xmlns:auth="http://example.com/authsoap">
   <soapenv:Header/>
   <soapenv:Body>
      <auth:LoginUserRequest>
         <auth:username>${username}</auth:username>
         <auth:password>${password}</auth:password>
      </auth:LoginUserRequest>
   </soapenv:Body>
</soapenv:Envelope>`;

            try {
                const response = await fetch("http://localhost:8081/ws", {
                    method: "POST",
                    headers: {
                        "Content-Type": "text/xml"
                    },
                    body: soapRequest
                });

                const text = await response.text();
                console.log(text);

                const tokenMatch = text.match(/<ns2:token>(.*?)<\/ns2:token>/);

                if (tokenMatch && tokenMatch[1]) {
                    const token = tokenMatch[1];
                    localStorage.setItem("token", token);
                    result.innerText = "Login successful";
                    window.location.href = "profile.html";
                } else {
                    result.innerText = "Login амжилтгүй.";
                }
            } catch (error) {
                console.error(error);
                result.innerText = "Login хийх үед алдаа гарлаа.";
            }
        }
    </script>
</body>
</html>
