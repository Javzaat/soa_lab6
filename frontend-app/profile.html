<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
</head>
<body>
    <h1>Profile Page</h1>

    <button onclick="loadProfiles()">Load Profiles</button>
    <button onclick="logout()">Logout</button>

    <pre id="profiles"></pre>

    <script>
        async function loadProfiles() {
            const token = localStorage.getItem("token");
            const profiles = document.getElementById("profiles");

            if (!token) {
                profiles.innerText = "Token байхгүй байна. Эхлээд login хийнэ үү.";
                return;
            }

            try {
                const response = await fetch("http://localhost:8080/users", {
                    method: "GET",
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });

                const text = await response.text();

                if (!response.ok) {
                    profiles.innerText = "Алдаа: " + text;
                    return;
                }

                try {
                    const data = JSON.parse(text);
                    profiles.innerText = JSON.stringify(data, null, 2);
                } catch {
                    profiles.innerText = text;
                }
            } catch (error) {
                console.error(error);
                profiles.innerText = "Profile ачаалах үед алдаа гарлаа.";
            }
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
